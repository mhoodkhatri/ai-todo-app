openapi: "3.1.0"
info:
  title: Todo App Backend API
  version: "0.1.0"
  description: |
    FastAPI backend for the Full-Stack Todo Application.
    Part 1 includes only the health check endpoint.
    Task CRUD endpoints will be added in Part 2.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /api/health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Backend is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  # Part 2 endpoints (stubs — not implemented in Part 1)
  /api/tasks:
    get:
      summary: List user's tasks
      operationId: listTasks
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, completed, incomplete]
            default: all
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a task
      operationId: createTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Validation error

  /api/tasks/{task_id}:
    get:
      summary: Get a task by ID
      operationId: getTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Task not found (or belongs to another user)

    put:
      summary: Update a task
      operationId: updateTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Task not found
        "422":
          description: Validation error

    delete:
      summary: Delete a task
      operationId: deleteTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "204":
          description: Task deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Task not found

  /api/tasks/{task_id}/toggle:
    patch:
      summary: Toggle task completion status
      operationId: toggleTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Task not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Better Auth JWT token from /api/auth/token

  parameters:
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Task:
      type: object
      required: [id, user_id, title, is_completed, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000
          nullable: true
        is_completed:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Task title (whitespace-only rejected)
        description:
          type: string
          maxLength: 1000
          nullable: true

    TaskUpdate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000
          nullable: true

  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
                example: Unauthorized
